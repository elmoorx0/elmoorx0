# Elmoorx Framework — Continuous Integration
#
# Runs on every push to main and on every PR. Performs:
#   1. Type-check (tsc --noEmit)
#   2. Lint (eslint)
#   3. Unit tests (node:test)
#   4. Build all workspaces
#   5. Verify version consistency
#
# Failures on any job block merge to main.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same PR/branch when new commits arrive
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Type-check ────────────────────────────────────────────────
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Run type-check
        run: npm run typecheck

  # ─── Job 2: Lint ──────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true # alpha stage — don't block PRs on warnings

  # ─── Job 3: Unit tests ────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Run unit tests
        run: npm run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            packages/*/tests/
            !packages/*/tests/node_modules
          retention-days: 7

  # ─── Job 4: Build ─────────────────────────────────────────────────────
  build:
    name: Build all workspaces
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Build all workspaces
        run: npm run build
        continue-on-error: true # alpha stage — many packages don't have a build yet

      - name: Verify build artifacts
        run: |
          echo "Built packages:"
          find packages -name "dist" -type d 2>/dev/null | head -20 || true

  # ─── Job 5: Verify version consistency ───────────────────────────────
  verify:
    name: Verify version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify versions
        run: |
          python3 - <<'EOF'
          import json, sys
          from pathlib import Path

          ROOT = Path(".")
          TARGET = "3.0.0-alpha.2"
          mismatches = []

          for pkg_json in (ROOT / "packages").rglob("package.json"):
              pkg = json.loads(pkg_json.read_text())
              v = pkg.get("version")
              if v != TARGET:
                  mismatches.append(f"{pkg_json}: version={v}")
              # Also check @elmoorx/* deps
              for field in ("dependencies", "devDependencies", "peerDependencies"):
                  for name, spec in pkg.get(field, {}).items():
                      if name.startswith("@elmoorx/") and spec != "workspace:^":
                          mismatches.append(f"{pkg_json}: {name}={spec}")

          if mismatches:
              print("❌ Version/dep mismatches:")
              for m in mismatches[:20]:
                  print(f"  {m}")
              sys.exit(1)
          print(f"✓ All packages at {TARGET}, all @elmoorx/* deps use workspace:^")
          EOF

  # ─── Job 6: Security audit ───────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Run npm audit (high severity)
        run: npm audit --audit-level=high --omit=dev || true
        continue-on-error: true

      - name: Run sanitizer test suite
        run: node --test packages/runtime/tests/sanitizer.test.mjs
