# CodeQL — GitHub's semantic code analysis
#
# Runs on every push to main and on every PR. Scans for:
#   - SQL injection (in @elmoorx/postgres)
#   - XSS (in @elmoorx/runtime sanitize + $html)
#   - Path traversal (in @elmoorx/server safeJoin)
#   - Hardcoded credentials
#   - Insecure crypto
#   - And many more (200+ queries)
#
# Results appear in the Security tab → Code scanning alerts.
# Free for public repos, 1000 minutes/month for private repos.

name: "CodeQL"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at 06:00 UTC — catches new queries added
    # by GitHub's security team between code changes.
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write  # required to upload CodeQL results

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use the 'security-extended' suite for more thorough scanning.
          # The default 'security-and-quality' is also a good choice.
          queries: security-extended
          # Optionally specify packs of additional queries
          # packs: githubsecuritylab/javascript-security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        # If autobuild fails for TypeScript monorepos, replace with:
        # - name: Build
        #   run: |
        #     npm install --legacy-peer-deps --ignore-scripts
        #     npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # Upload results even on failure so they're visible
          output: sarif-results
