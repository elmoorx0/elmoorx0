# Elmoorx Framework — Matrix CI
#
# Runs the test suite against multiple Node.js versions (20, 22, 24)
# to catch version-specific regressions. This is a separate workflow
# from ci.yml because:
#   - Matrix builds use more CI minutes
#   - Most regressions are version-agnostic and caught by ci.yml
#   - This catches the rare Node 20 vs 22 vs 24 behavioral differences
#     (e.g. test runner API changes, --experimental-* flags, perf)
#
# Runs on every push to main and on every PR.

name: Matrix CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # don't cancel other versions on first failure
      matrix:
        node: ["20", "22", "24"]
    continue-on-error: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Show Node + npm versions
        run: |
          node --version
          npm --version

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run benchmark regression tests
        run: NODE_ENV=test npx tsx --test packages/runtime/tests/benchmark-regression.test.mjs

  # ─── Summary job that depends on all matrix jobs ─────────────────────
  summary:
    name: Matrix summary
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check matrix results
        run: |
          echo "## Matrix CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Node version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 20 | ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Note: This job always runs, even if a matrix job fails." >> $GITHUB_STEP_SUMMARY
          echo "Check the individual Test (Node X) jobs above for details." >> $GITHUB_STEP_SUMMARY

      - name: Fail if any matrix job failed
        if: needs.test.result == 'failure'
        run: |
          echo "❌ One or more matrix jobs failed"
          exit 1
