name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        default: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@elmoorx'

      - name: Configure npm
        run: |
          echo "npm registry: $(npm config get registry)"
          npm whoami || echo "Not logged in (will use NODE_AUTH_TOKEN)"

      - name: Verify all packages
        run: |
          echo "📦 Verifying ${PACKAGES:-76} packages..."
          node scripts/npm-prepare.cjs
          echo "✅ All packages prepared"

      - name: Publish packages (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' || github.ref != 'refs/heads/main' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "🧪 Dry run mode — no packages will be published"
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              name=$(node -p "require('./$pkg/package.json').name")
              echo "  Testing: $name"
              (cd "$pkg" && npm publish --dry-run --access public 2>&1 | tail -2) || true
            fi
          done
          echo "✅ Dry run complete"

      - name: Publish packages (production)
        if: ${{ github.event.inputs.dry_run != 'true' && startsWith(github.ref, 'refs/tags/v') }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "🚀 Publishing all packages to npm..."
          FAILED=0
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              name=$(node -p "require('./$pkg/package.json').name")
              version=$(node -p "require('./$pkg/package.json').version")
              echo "  Publishing: $name@$version"
              (cd "$pkg" && npm publish --access public --provenance 2>&1) || {
                echo "  ❌ Failed to publish $name@$version"
                FAILED=$((FAILED + 1))
              }
            fi
          done
          echo "✅ Publish complete ($FAILED failures)"
          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED packages failed to publish (may already exist at this version)"
          fi

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Elmoorx Framework ${{ github.ref_name }}

            ### Installation

            ```bash
            npm install @elmoorx/runtime @elmoorx/router @elmoorx/server
            ```

            ### What's New

            - 78 npm packages published
            - Alpha release — several packages contain mock implementations
            - See per-package READMEs for maturity details
            - Run your own security audits before production use

            See [CHANGELOG.md](./changelog/CHANGELOG.md) for full details.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
