name: Setup GitHub Repository

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      repository-projects: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'bug', color: 'd73a4a', description: 'Something isn't working' },
              { name: 'feature', color: 'a2eeef', description: 'New feature request' },
              { name: 'enhancement', color: '84b6eb', description: 'Enhancement to existing feature' },
              { name: 'documentation', color: '0075ca', description: 'Improvements or additions to documentation' },
              { name: 'good first issue', color: '7057ff', description: 'Good for newcomers' },
              { name: 'help wanted', color: '008672', description: 'Extra attention is needed' },
              { name: 'security', color: 'b60205', description: 'Security issue' },
              { name: 'performance', color: 'fbca04', description: 'Performance improvement' },
              { name: 'elmoorx-ui', color: 'c5def5', description: 'UI component related' },
              { name: 'elmoorx-server', color: 'c5def5', description: 'Server related' },
              { name: 'elmoorx-runtime', color: 'c5def5', description: 'Runtime related' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
                console.log(`Created label: ${label.name}`);
              } catch (e) {
                console.log(`Label ${label.name} may already exist: ${e.message}`);
              }
            }

      - name: Create milestones
        uses: actions/github-script@v7
        with:
          script: |
            const milestones = [
              { title: 'v2.0.0-beta', description: 'Beta release — stabilization and bug fixes' },
              { title: 'v2.0.0-rc', description: 'Release candidate — feature freeze' },
              { title: 'v2.0.0', description: 'Stable release' },
              { title: 'v2.1.0', description: 'Next minor — new features' },
            ];
            for (const ms of milestones) {
              try {
                await github.rest.issues.createMilestone({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...ms,
                });
                console.log(`Created milestone: ${ms.title}`);
              } catch (e) {
                console.log(`Milestone ${ms.title} may exist: ${e.message}`);
              }
            }

      - name: Configure repository settings
        uses: actions/github-script@v7
        with:
          script: |
            // Enable issues, projects, wiki
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              has_issues: true,
              has_projects: true,
              has_wiki: true,
              has_discussions: true,
              allow_squash_merge: true,
              allow_merge_commit: false,
              allow_rebase_merge: false,
              delete_branch_on_merge: true,
              squash_merge_commit_title: 'PR_TITLE',
              squash_merge_commit_message: 'PR_BODY',
            });
            console.log('Repository configured');
