# Stale — automatically closes stale issues and PRs
# https://github.com/actions/stale
#
# Why: keeps the issue tracker actionable. Issues that haven't had
# activity in 60 days are marked stale; after 14 more days without
# response, they're closed. This is standard practice for OSS projects
# of this size.

name: Mark stale issues and PRs

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # ─── Issues ────────────────────────────────────────────────
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,security,good first issue,help wanted,roadmap"
          stale-issue-message: |
            👋 This issue has been inactive for 60 days and is being
            marked as stale. It will be closed in 14 days unless:
            - There is new activity (comment, commit, etc.)
            - The `stale` label is removed
            - It's added to the roadmap

            If you still care about this issue, please comment with
            your use case or +1 to keep it open. If it's a feature
            request that was implemented, please close it manually.

          close-issue-message: |
            🔒 This issue was closed because it has been stale for
            14 days with no activity. Feel free to reopen if the
            issue persists or you have new information.

          # ─── Pull Requests ────────────────────────────────────────
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: "stale"
          exempt-pr-labels: "pinned,security,blocked,work-in-progress"
          stale-pr-message: |
            👋 This PR has been inactive for 30 days and is being
            marked as stale. It will be closed in 14 days unless
            there's new activity.

            If you're still working on this, please push a commit or
            comment to remove the stale label. If you need help,
            ping one of the maintainers.

          close-pr-message: |
            🔒 This PR was closed due to inactivity. Feel free to
            reopen if you want to continue the work.

          # ─── General ──────────────────────────────────────────────
          # Only mark 30 issues per run (avoid spamming on first run)
          operations-per-run: 30
          # Don't mark issues that are assigned to someone
          exempt-all-assignees: true
          # Don't mark issues in milestones
          exempt-all-milestones: true
          # Ascending order (oldest first) — tackle the oldest staleness
          ascending: true
