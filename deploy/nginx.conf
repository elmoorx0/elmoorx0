events {
  worker_connections 1024;
}

http {
  upstream elmoorx_app {
    server elmoorx-app:3001;
    keepalive 64;
  }

  upstream elmoorx_ws {
    server elmoorx-app:3002;
    keepalive 64;
  }

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=general:10m rate=1000r/m;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1000;
  gzip_comp_level 6;

  # Cache
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=app_cache:10m max_size=100m inactive=60m;

  server {
    listen 80;
    server_name elmoorx.dev www.elmoorx.dev;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' ws: wss:; frame-ancestors 'none'" always;

    # API routes
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://elmoorx_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache app_cache;
      proxy_cache_valid 200 5m;
      proxy_cache_valid 404 1m;
    }

    # WebSocket
    location /ws {
      proxy_pass http://elmoorx_ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 86400;
    }

    # Static files
    location / {
      limit_req zone=general burst=50 nodelay;
      proxy_pass http://elmoorx_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache app_cache;
      proxy_cache_valid 200 10m;
    }

    # Health check
    location /health {
      access_log off;
      proxy_pass http://elmoorx_app/api/health;
    }
  }
}
