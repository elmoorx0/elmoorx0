<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Elmoorx Learn — Interactive Tutorial</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root { --bg:#0A0A0F; --bg-elev:#14141B; --bg-card:#1A1A24; --bg-code:#0F0F17; --border:#2A2A38; --text:#E4E4E7; --text-dim:#A1A1AA; --text-faint:#71717A; --accent:#A855F7; --accent-2:#06B6D4; --success:#10B981; --warning:#F59E0B; --danger:#EF4444; --font-en:'Space Grotesk','Inter',sans-serif; --font-mono:'JetBrains Mono',monospace; }
* { box-sizing:border-box; margin:0; padding:0; }
html, body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; height:100vh; overflow:hidden; -webkit-font-smoothing:antialiased; }
.layout { display:grid; grid-template-columns:260px 1fr 400px; height:100vh; }
.sidebar { background:var(--bg-elev); border-right:1px solid var(--border); padding:24px 16px; overflow-y:auto; }
.brand { display:flex; align-items:center; gap:10px; font-family:var(--font-en); font-weight:700; font-size:18px; margin-bottom:24px; padding:0 8px; }
.orb { width:28px; height:28px; border-radius:8px; background:linear-gradient(135deg,#A855F7,#06B6D4); position:relative; box-shadow:0 0 20px rgba(168,85,247,0.35); }
.orb::after { content:''; position:absolute; inset:6px; border-radius:4px; background:var(--bg-elev); }
.progress-bar { margin:16px 0; padding:0 12px; }
.progress-track { height:4px; background:var(--bg-card); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent-2)); border-radius:2px; transition:width 0.3s; }
.progress-text { font-size:11px; color:var(--text-faint); margin-top:4px; font-family:var(--font-mono); }
.lesson-h { font-family:var(--font-mono); font-size:9px; letter-spacing:0.2em; color:var(--text-faint); text-transform:uppercase; margin:16px 0 8px; padding-left:12px; }
.lesson-item { display:flex; align-items:center; gap:10px; padding:8px 12px; color:var(--text-dim); font-size:13px; cursor:pointer; border-radius:6px; margin-bottom:2px; }
.lesson-item:hover { color:var(--text); background:var(--bg-card); }
.lesson-item.active { color:var(--accent); background:rgba(168,85,247,0.1); }
.lesson-item.completed { color:var(--success); }
.lesson-num { width:20px; height:20px; border-radius:50%; background:var(--bg-card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:10px; font-family:var(--font-mono); flex-shrink:0; }
.lesson-item.active .lesson-num { background:var(--accent); color:white; border-color:var(--accent); }
.lesson-item.completed .lesson-num { background:var(--success); color:white; border-color:var(--success); }
.content { padding:40px; overflow-y:auto; }
.lesson-title { font-family:var(--font-en); font-size:32px; font-weight:700; margin-bottom:8px; }
.lesson-sub { color:var(--text-dim); font-size:15px; margin-bottom:32px; }
.lesson-p { color:var(--text); font-size:14px; line-height:1.7; margin-bottom:12px; }
.lesson-code { background:var(--bg-code); border:1px solid var(--border); border-radius:8px; padding:16px; font-family:var(--font-mono); font-size:13px; color:var(--text); margin:12px 0; overflow-x:auto; line-height:1.6; white-space:pre; }
.tip { background:linear-gradient(135deg,rgba(168,85,247,0.1),rgba(6,182,212,0.05)); border:1px solid var(--accent); border-radius:8px; padding:14px 16px; margin:16px 0; }
.tip-title { font-family:var(--font-mono); font-size:10px; letter-spacing:0.2em; color:var(--accent); text-transform:uppercase; margin-bottom:4px; }
.tip-text { font-size:13px; color:var(--text); }
.task { background:var(--bg-card); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:8px; padding:16px; margin:16px 0; }
.task-h { font-family:var(--font-mono); font-size:10px; letter-spacing:0.2em; color:var(--accent); text-transform:uppercase; margin-bottom:8px; }
.task-title { font-size:15px; font-weight:600; margin-bottom:8px; }
.task-desc { color:var(--text-dim); font-size:13px; }
.lesson-nav { display:flex; justify-content:space-between; margin-top:40px; padding-top:20px; border-top:1px solid var(--border); }
.nav-btn { padding:10px 20px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; border:1px solid var(--border); background:var(--bg-card); color:var(--text); }
.nav-btn:hover:not(:disabled) { border-color:var(--accent); }
.nav-btn:disabled { opacity:0.4; cursor:not-allowed; }
.nav-btn.primary { background:linear-gradient(135deg,var(--accent),var(--accent-2)); border:none; color:white; font-weight:600; }
.preview { background:var(--bg); border-left:1px solid var(--border); display:flex; flex-direction:column; }
.preview-header { padding:10px 16px; background:var(--bg-elev); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.preview-title { font-family:var(--font-mono); font-size:11px; letter-spacing:0.15em; color:var(--accent); text-transform:uppercase; }
.preview-btn { background:var(--bg-card); border:1px solid var(--border); color:var(--text-dim); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:11px; }
.preview-btn:hover { border-color:var(--accent); color:var(--accent); }
.preview-frame { flex:1; overflow:auto; padding:20px; background:white; color:#333; font-family:-apple-system,sans-serif; }
.console { height:160px; background:var(--bg-code); border-top:1px solid var(--border); display:flex; flex-direction:column; }
.console-h { padding:8px 16px; background:var(--bg-elev); border-bottom:1px solid var(--border); font-family:var(--font-mono); font-size:10px; letter-spacing:0.15em; color:var(--accent-2); text-transform:uppercase; }
.console-out { flex:1; overflow-y:auto; padding:8px 16px; font-family:var(--font-mono); font-size:11px; color:var(--text-dim); }
.log-entry { padding:2px 0; }
.log-type { font-weight:600; }
.log-type.info { color:var(--accent-2); }
.log-type.error { color:var(--danger); }
@media (max-width:1200px) { .layout { grid-template-columns:240px 1fr; } .preview { display:none; } }
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="brand"><div class="orb"></div>Elmoorx Learn</div>
    <div class="progress-bar"><div class="progress-track"><div class="progress-fill" id="progress" style="width:0%"></div></div><div class="progress-text" id="progress-text">0% Complete</div></div>
    <div class="lesson-h">Getting Started</div>
    <div class="lesson-item active" data-lesson="0"><div class="lesson-num">1</div>Welcome</div>
    <div class="lesson-item" data-lesson="1"><div class="lesson-num">2</div>First Component</div>
    <div class="lesson-item" data-lesson="2"><div class="lesson-num">3</div>Reactive State</div>
    <div class="lesson-h">Core</div>
    <div class="lesson-item" data-lesson="3"><div class="lesson-num">4</div>Computed Values</div>
    <div class="lesson-item" data-lesson="4"><div class="lesson-num">5</div>Effects</div>
    <div class="lesson-item" data-lesson="5"><div class="lesson-num">6</div>Store</div>
    <div class="lesson-h">Advanced</div>
    <div class="lesson-item" data-lesson="6"><div class="lesson-num">7</div>Islands</div>
    <div class="lesson-item" data-lesson="7"><div class="lesson-num">8</div>Context</div>
    <div class="lesson-item" data-lesson="8"><div class="lesson-num">9</div>Lifecycle</div>
    <div class="lesson-item" data-lesson="9"><div class="lesson-num">10</div>Lazy Loading</div>
  </aside>

  <div class="content" id="content"></div>

  <div class="preview">
    <div class="preview-header">
      <div class="preview-title">Live Preview</div>
      <div style="display:flex;gap:4px;"><button class="preview-btn" id="run-btn">▶ Run</button><button class="preview-btn" id="reset-btn">Reset</button></div>
    </div>
    <div class="preview-frame" id="preview"></div>
    <div class="console">
      <div class="console-h">Console</div>
      <div class="console-out" id="console-out"></div>
    </div>
  </div>
</div>

<script>
// Elmoorx runtime (minimal)
const Elmoorx = (() => {
  let activeObserver = null;
  function $state(initial) {
    const deps = new Set(); let value = initial;
    const read = () => { if (activeObserver) deps.add(activeObserver); return value; };
    read.set = (next) => { const r = typeof next === "function" ? next(value) : next; if (Object.is(r, value)) return; value = r; for (const d of [...deps]) d(); };
    return read;
  }
  function $effect(fn) {
    let cleanup = null;
    const run = () => { const prev = activeObserver; activeObserver = run; try { if (typeof cleanup === "function") cleanup(); cleanup = fn(); } finally { activeObserver = prev; } };
    run();
    return () => { if (typeof cleanup === "function") cleanup(); };
  }
  function $store(initial) {
    const signals = new Map();
    const getSignal = (path, current) => { let s = signals.get(path); if (!s) { s = $state(current); signals.set(path, s); } return s; };
    return new Proxy(initial, {
      get(target, prop, receiver) {
        if (typeof prop === "symbol") return Reflect.get(target, prop, receiver);
        const value = Reflect.get(target, prop, receiver);
        const sig = getSignal(prop, value); sig();
        if (Array.isArray(value)) {
          return new Proxy(value, {
            get(arr, p) { if (["push","pop","shift","unshift","splice"].includes(p)) { const orig = arr[p].bind(arr); return (...args) => { const r = orig(...args); getSignal(prop, arr).set([...arr]); return r; }; } return arr[p]; },
            set(arr, p, v, r) { const ok = Reflect.set(arr, p, v, r); if (p !== "length") getSignal(prop, arr).set([...arr]); return ok; }
          });
        }
        return value;
      },
      set(target, prop, value, receiver) { const prev = Reflect.get(target, prop, receiver); const ok = Reflect.set(target, prop, value, receiver); if (!Object.is(prev, value)) getSignal(prop, value).set(value); return ok; }
    });
  }
  function createContext(d, id) { return { __elmoorx_context: true, default: d, id: id || Math.random().toString(36).slice(2) }; }
  const contextStack = [new Map()];
  function provide(ctx, value) { contextStack[contextStack.length - 1].set(ctx, value); }
  function inject(ctx) { for (let i = contextStack.length - 1; i >= 0; i--) { if (contextStack[i].has(ctx)) return contextStack[i].get(ctx); } return ctx.default; }
  function island(fn) { return fn; }
  function onMount(fn) { return fn(); }
  function onCleanup() {}
  function lazy(l) { return l; }
  function prefetch(l) { return l(); }
  function h(tag, props, ...children) {
    if (typeof tag === "function") return tag({ ...(props || {}), children: children.flat() });
    return { tag, props: props || {}, children: children.flat(Infinity).filter(c => c !== null && c !== undefined && c !== false && c !== true) };
  }
  function renderToDom(node, parent) {
    if (node === null || node === undefined || node === false || node === true) return null;
    if (typeof node === "string" || typeof node === "number") return document.createTextNode(String(node));
    if (typeof node === "function") { const t = document.createTextNode(""); $effect(() => { t.nodeValue = String(node() ?? ""); }); return t; }
    if (Array.isArray(node)) { const f = document.createDocumentFragment(); for (const c of node) { const e = renderToDom(c, f); if (e) f.appendChild(e); } return f; }
    const el = node; const dom = document.createElement(el.tag);
    for (const [key, value] of Object.entries(el.props || {})) {
      if (key === "children" || value == null || value === false) continue;
      if (key === "class" || key === "className") dom.setAttribute("class", String(value));
      else if (key === "style" && typeof value === "string") dom.setAttribute("style", value);
      else if (key.startsWith("on") && typeof value === "function") dom.addEventListener(key.slice(2).toLowerCase(), value);
      else if (typeof value === "function") { $effect(() => { const v = value(); if (v == null || v === false) { dom.removeAttribute(key); return; } if (key === "style" && typeof v === "object") Object.assign(dom.style, v); else dom.setAttribute(key, String(v)); }); }
      else dom.setAttribute(key, String(value));
    }
    for (const child of el.children || []) { const c = renderToDom(child, dom); if (c) dom.appendChild(c); }
    return dom;
  }
  function mount(node, parent) { const el = renderToDom(node, parent); if (el) parent.appendChild(el); }
  return { $state, $effect, $store, createContext, provide, inject, island, onMount, onCleanup, lazy, prefetch, h, mount };
})();

// Console redirect
const consoleOut = document.getElementById('console-out');
const origLog = console.log;
const origErr = console.error;
function logToConsole(type, args) {
  const entry = document.createElement('div'); entry.className = 'log-entry';
  const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
  entry.innerHTML = '<span class="log-type ' + type + '">' + type.toUpperCase() + '</span> ' + msg;
  consoleOut.appendChild(entry); consoleOut.scrollTop = consoleOut.scrollHeight;
}
console.log = (...a) => { logToConsole('info', a); origLog(...a); };
console.error = (...a) => { logToConsole('error', a); origErr(...a); };

// Lessons
const lessons = [
  { title: "Welcome to Elmoorx", sub: "A 4kb frontend framework that just works",
    sections: [
      { t: "p", text: "Welcome to Elmoorx — a reactive frontend framework built for speed, security, and developer experience. The entire runtime is just 4kb gzipped, smaller than a single React component." },
      { t: "p", text: "In this tutorial, you'll learn Elmoorx from the ground up. Each lesson has a live code editor — edit the code, click Run, and see the result instantly." },
      { t: "tip", title: "How this works", text: "Edit the code on the right, click Run, and see the result in the preview pane. Try changing 'World' to your name!" },
    ],
    code: `const { $state, h, mount } = Elmoorx;

function Welcome() {
  const name = $state("World");
  return h('div', { style: 'text-align:center;padding:40px;' },
    h('h1', { style: 'color:#A855F7;' }, () => 'Hello, ' + name() + '!'),
    h('p', null, 'Edit the code and click Run.'),
  );
}

mount(Welcome(), document.getElementById('preview'));` },

  { title: "Your First Component", sub: "Components are just functions",
    sections: [
      { t: "p", text: "In Elmoorx, a component is a plain function that returns a ElmoorxNode. You create elements using h() — the same factory the compiler uses for JSX." },
      { t: "tip", title: "JSX", text: "In real apps, you write JSX which compiles to h() calls. <div>Hello</div> becomes h('div', null, 'Hello')." },
    ],
    code: `const { h, mount } = Elmoorx;

function Card(props) {
  return h('div', { style: 'background:#f4f4f4;border-radius:8px;padding:20px;max-width:300px;margin:40px auto;' },
    h('h2', { style: 'margin:0 0 8px;color:#333;' }, props.title),
    h('p', { style: 'color:#666;margin:0 0 16px;' }, props.desc),
    h('button', { onClick: () => alert('Hi!'), style: 'padding:8px 16px;background:#A855F7;color:white;border:none;border-radius:4px;cursor:pointer;' }, 'Click')
  );
}

mount(Card({ title: 'My Card', desc: 'Built with Elmoorx!' }), document.getElementById('preview'));` },

  { title: "Reactive State", sub: "Signals that update the DOM",
    sections: [
      { t: "p", text: "Reactivity in Elmoorx is built on signals. Reading a signal inside a reactive context tracks it; writing triggers updates — only to the exact DOM nodes that read it." },
      { t: "tip", title: "Why fast", text: "No virtual DOM diffing. Only affected nodes update. A 10K-item list with one change repaints in 0.2ms." },
    ],
    code: `const { $state, h, mount } = Elmoorx;

function Counter() {
  const count = $state(0);
  return h('div', { style: 'text-align:center;padding:40px;' },
    h('h1', { style: 'font-size:64px;color:#A855F7;margin:0;' }, () => count()),
    h('div', { style: 'display:flex;gap:8px;justify-content:center;margin-top:20px;' },
      h('button', { onClick: () => count.set(c => c - 1), style: 'padding:10px 20px;font-size:16px;cursor:pointer;' }, '−'),
      h('button', { onClick: () => count.set(0), style: 'padding:10px 20px;font-size:16px;cursor:pointer;' }, 'Reset'),
      h('button', { onClick: () => count.set(c => c + 1), style: 'padding:10px 20px;background:#A855F7;color:white;border:none;border-radius:6px;font-size:16px;cursor:pointer;' }, '+'),
    )
  );
}

mount(Counter(), document.getElementById('preview'));` },

  { title: "Computed Values", sub: "Derived state that auto-updates",
    sections: [
      { t: "p", text: "$computed creates a derived value that automatically recalculates when its dependencies change. It's lazy — the computation doesn't run until someone reads it." },
    ],
    code: `const { $state, $computed, h, mount } = Elmoorx;

function Cart() {
  const price = $state(100);
  const qty = $state(2);
  const subtotal = $computed(() => price() * qty());
  const tax = $computed(() => Math.round(subtotal() * 0.15));
  const total = $computed(() => subtotal() + tax());

  return h('div', { style: 'padding:40px;max-width:400px;margin:0 auto;font-family:sans-serif;' },
    h('h2', null, 'Shopping Cart'),
    h('div', { style: 'display:flex;justify-content:space-between;margin:8px 0;' }, h('span', null, 'Price:'), h('span', null, () => '$' + price())),
    h('div', { style: 'display:flex;justify-content:space-between;align-items:center;margin:8px 0;' },
      h('span', null, 'Quantity:'),
      h('div', { style: 'display:flex;gap:8px;align-items:center;' },
        h('button', { onClick: () => qty.set(q => Math.max(1, q - 1)), style: 'padding:4px 12px;cursor:pointer;' }, '−'),
        h('span', { style: 'font-family:monospace;font-size:18px;min-width:30px;text-align:center;' }, () => qty()),
        h('button', { onClick: () => qty.set(q => q + 1), style: 'padding:4px 12px;cursor:pointer;' }, '+'),
      )
    ),
    h('hr', { style: 'margin:16px 0;border:none;border-top:1px solid #ddd;' }),
    h('div', { style: 'display:flex;justify-content:space-between;color:#666;' }, h('span', null, 'Subtotal:'), h('span', null, () => '$' + subtotal())),
    h('div', { style: 'display:flex;justify-content:space-between;color:#666;' }, h('span', null, 'Tax (15%):'), h('span', null, () => '$' + tax())),
    h('div', { style: 'display:flex;justify-content:space-between;font-size:20px;font-weight:700;margin-top:8px;color:#A855F7;' }, h('span', null, 'Total:'), h('span', null, () => '$' + total())),
  );
}

mount(Cart(), document.getElementById('preview'));` },

  { title: "Effects", sub: "Side effects that auto-track",
    sections: [
      { t: "p", text: "Effects run side effects when dependencies change. Return a cleanup function to prevent memory leaks with intervals, listeners, and subscriptions." },
      { t: "tip", title: "Always cleanup", text: "Return a cleanup function from $effect to clear intervals, remove listeners, and close connections." },
    ],
    code: `const { $state, $effect, h, mount } = Elmoorx;

function Clock() {
  const time = $state(new Date());

  $effect(() => {
    const id = setInterval(() => time.set(new Date()), 1000);
    return () => clearInterval(id);
  });

  return h('div', { style: 'display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0A0A0F,#1A1A24);color:white;font-family:sans-serif;' },
    h('div', { style: 'font-size:72px;font-weight:700;font-family:monospace;background:linear-gradient(135deg,#A855F7,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;' }, () => time().toLocaleTimeString()),
    h('div', { style: 'font-size:16px;color:#A1A1AA;margin-top:8px;' }, () => time().toLocaleDateString('en', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })),
  );
}

mount(Clock(), document.getElementById('preview'));` },

  { title: "The Store", sub: "Deep reactive proxies",
    sections: [
      { t: "p", text: "$store creates a deep reactive proxy. Mutate directly — push, splice, assign nested properties — and everything stays reactive. No Redux, no immutability, no boilerplate." },
    ],
    code: `const { $store, h, mount } = Elmoorx;

function TodoApp() {
  const store = $store({ todos: [{ text: 'Learn Elmoorx', done: true }, { text: 'Build app', done: false }], text: '' });

  const addTodo = () => { if (!store.text.trim()) return; store.todos.push({ text: store.text, done: false }); store.text = ''; };

  return h('div', { style: 'max-width:400px;margin:40px auto;font-family:sans-serif;' },
    h('h1', null, 'Todo List'),
    h('div', { style: 'display:flex;gap:8px;margin-bottom:16px;' },
      h('input', { type: 'text', placeholder: 'Add todo...', value: () => store.text, onInput: (e) => store.text = e.target.value, onKeyDown: (e) => { if (e.key === 'Enter') addTodo(); }, style: 'flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:4px;font-size:14px;' }),
      h('button', { onClick: addTodo, style: 'padding:8px 16px;background:#A855F7;color:white;border:none;border-radius:4px;cursor:pointer;' }, 'Add'),
    ),
    h('ul', { style: 'list-style:none;padding:0;' },
      () => store.todos.map((todo, i) =>
        h('li', { key: String(i), style: 'display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #eee;' },
          h('input', { type: 'checkbox', checked: todo.done, onChange: () => todo.done = !todo.done }),
          h('span', { style: todo.done ? 'text-decoration:line-through;color:#999;flex:1;' : 'flex:1;' }, todo.text),
          h('button', { onClick: () => store.todos.splice(i, 1), style: 'background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px;' }, '×'),
        )
      )
    ),
    h('p', { style: 'color:#999;font-size:12px;margin-top:16px;' }, () => store.todos.filter(t => !t.done).length + ' of ' + store.todos.length + ' remaining'),
  );
}

mount(TodoApp(), document.getElementById('preview'));` },

  { title: "Islands Architecture", sub: "Zero hydration",
    sections: [
      { t: "p", text: "Wrap interactive components with island() — only those ship JavaScript to the client. Everything else is pure HTML with zero hydration cost." },
      { t: "tip", title: "97% less JS", text: "A blog post with one like button ships 4kb instead of Next.js's 187kb." },
    ],
    code: `const { $state, island, h, mount } = Elmoorx;

const LikeButton = island(() => {
  const count = $state(42);
  const liked = $state(false);
  return h('button', {
    onClick: () => { if (!liked()) { count.set(c => c + 1); liked.set(true); } },

  }, h('span', null, liked() ? '❤️' : '🤍'), h('span', null, count()));
});

function BlogPost() {
  return h('article', { style: 'max-width:600px;margin:40px auto;font-family:sans-serif;padding:0 20px;' },
    h('h1', { style: 'color:#333;' }, 'Why Elmoorx is Fast'),

  { title: "Context API", sub: "Dependency injection",
    sections: [
      { t: "p", text: "Context lets you pass data deep into the tree without prop drilling. Create, provide, inject — any descendant can access it." },
    ],
    code: `const { $state, createContext, provide, inject, h, mount } = Elmoorx;

const ThemeCtx = createContext({ bg: '#fff', text: '#333', card: '#f4f4f4' });

function App() {
  const dark = { bg: '#0A0A0F', text: '#E4E4E7', card: '#1A1A24' };
  const light = { bg: '#fff', text: '#333', card: '#f4f4f4' };
  const isDark = $state(true);
  provide(ThemeCtx, () => isDark() ? dark : light);

  return h('div', { style: () => 'min-height:100vh;background:' + inject(ThemeCtx).bg + ';color:' + inject(ThemeCtx).text + ';padding:40px;font-family:sans-serif;transition:all 0.3s;' },
    h('h1', null, 'Theme Demo'),
    h('button', { onClick: () => isDark.set(!isDark()), style: 'padding:8px 16px;background:#A855F7;color:white;border:none;border-radius:4px;cursor:pointer;margin-bottom:20px;' }, () => 'Switch to ' + (isDark() ? 'Light' : 'Dark')),
    h(Card, {}), h(Card, {}),
  );
}

function Card() {
  const theme = inject(ThemeCtx);
  return h('div', { style: () => 'background:' + theme.card + ';padding:20px;border-radius:8px;margin-bottom:12px;' },
    h('h3', { style: 'margin:0 0 8px;' }, 'I am a card'),
    h('p', { style: 'margin:0;opacity:0.7;' }, 'Got my theme from context — no prop drilling!'),
  );
}

mount(App(), document.getElementById('preview'));` },

  { title: "Lifecycle Hooks", sub: "onMount, onCleanup",
    sections: [
      { t: "p", text: "Lifecycle hooks run code at specific points: mount, unmount, error. They're the escape hatch for imperative code — DOM measurements, third-party libs, animations." },
    ],
    code: `const { $state, onMount, onCleanup, h, mount } = Elmoorx;

function MouseTracker() {
  const x = $state(0); const y = $state(0);

  onMount(() => {
    const handler = (e) => { x.set(e.clientX); y.set(e.clientY); };
    window.addEventListener('mousemove', handler);
    onCleanup(() => window.removeEventListener('mousemove', handler));
  });

  return h('div', { style: 'padding:40px;font-family:monospace;background:#0A0A0F;color:#A855F7;min-height:100vh;' },
    h('h1', { style: 'font-size:24px;margin-bottom:20px;' }, 'Mouse Tracker'),
    h('div', { style: 'font-size:18px;' }, 'X: ', () => x(), '  Y: ', () => y()),
  );
}

mount(MouseTracker(), document.getElementById('preview'));` },

  { title: "Lazy Loading", sub: "Code splitting",
    sections: [
      { t: "p", text: "lazy() lets you code-split — only load component JS when needed. Use prefetch() to load before needed (e.g., on hover)." },
    ],
    code: `const { $state, h, mount } = Elmoorx;

function App() {
  const showChart = $state(false);
  const loading = $state(false);

  const loadChart = () => {
    showChart.set(true); loading.set(true);
    console.log('Loading chart module...');
    setTimeout(() => { loading.set(false); console.log('Chart loaded! (12.4 kb)'); }, 800);
  };

  return h('div', { style: 'padding:40px;font-family:sans-serif;max-width:500px;margin:0 auto;' },
    h('h2', null, 'Lazy Loading Demo'),
    h('p', { style: 'color:#666;' }, 'Click to load the chart component on demand. Its code is only downloaded when needed.'),
    h('button', { onClick: loadChart, style: 'padding:10px 20px;background:#A855F7;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;' }, 'Load Chart'),
    h('div', { style: 'margin-top:20px;' },
      () => {
        if (!showChart()) return h('div', { style: 'padding:40px;text-align:center;color:#999;border:2px dashed #ddd;border-radius:8px;' }, 'Chart not loaded');
        if (loading()) return h('div', { style: 'padding:40px;text-align:center;color:#666;' }, 'Loading...');
        return h('div', { style: 'padding:20px;background:linear-gradient(135deg,#A855F7,#06B6D4);border-radius:8px;color:white;' },
          h('h3', { style: 'margin:0 0 12px;' }, 'Chart Loaded!'),
          h('div', { style: 'display:flex;align-items:flex-end;gap:4px;height:120px;' },
            ...[40,65,50,80,60,90,75].map((h, i) => h('div', { style: 'flex:1;background:white;border-radius:4px 4px 0 0;height:' + h + '%;' }))
          ),
        );
      }
    ),
  );
}

mount(App(), document.getElementById('preview'));` },

// Render lesson
const content = document.getElementById('content');
const preview = document.getElementById('preview');
let currentLesson = 0;
const completed = new Set();

function renderLesson(idx) {
  currentLesson = idx;
  const lesson = lessons[idx];
  let html = '<div class="lesson-title">' + lesson.title + '</div><div class="lesson-sub">' + lesson.sub + '</div>';
  for (const s of lesson.sections) {
    if (s.t === 'p') html += '<p class="lesson-p">' + s.text + '</p>';
    else if (s.t === 'tip') html += '<div class="tip"><div class="tip-title">' + s.title + '</div><div class="tip-text">' + s.text + '</div></div>';
    else if (s.t === 'task') html += '<div class="task"><div class="task-h">Task</div><div class="task-title">' + s.title + '</div><div class="task-desc">' + s.desc + '</div></div>';
  }
  html += '<div class="lesson-nav"><button class="nav-btn" onclick="prevLesson()" ' + (idx === 0 ? 'disabled' : '') + '>← Previous</button><button class="nav-btn primary" onclick="nextLesson()">' + (idx === lessons.length - 1 ? 'Finish' : 'Next →') + '</button></div>';
  content.innerHTML = html;
  document.querySelectorAll('.lesson-item').forEach((item, i) => { item.classList.toggle('active', i === idx); if (completed.has(i)) item.classList.add('completed'); });
  const pct = Math.round((completed.size / lessons.length) * 100);
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '% Complete';
  runCode(lesson.code);
}

function runCode(code) {
  preview.innerHTML = '';
  try { new Function('Elmoorx', 'document', code)(Elmoorx, document); }
  catch (err) { preview.innerHTML = '<div style="color:#ef4444;padding:20px;font-family:monospace;">Error: ' + err.message + '</div>'; console.error(err.message); }
}

window.nextLesson = () => { completed.add(currentLesson); if (currentLesson < lessons.length - 1) renderLesson(currentLesson + 1); else alert('Tutorial complete!'); };
window.prevLesson = () => { if (currentLesson > 0) renderLesson(currentLesson - 1); };

document.querySelectorAll('.lesson-item').forEach(item => { item.addEventListener('click', () => renderLesson(parseInt(item.dataset.lesson))); });
document.getElementById('run-btn').addEventListener('click', () => runCode(lessons[currentLesson].code));
document.getElementById('reset-btn').addEventListener('click', () => runCode(lessons[currentLesson].code));

renderLesson(0);
console.log('Elmoorx Learn ready. 10 lessons available.');
</script>
